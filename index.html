<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>晩ごはん連絡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 24px;
      padding: 24px;
    }
    h1 { font-size: 1.4rem; color: #333; }
    .buttons { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 320px; }
    button {
      font-size: 1.6rem;
      font-weight: bold;
      padding: 28px;
      border: none;
      border-radius: 16px;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .yes { background: #4caf50; }
    .no  { background: #f44336; }
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.ok   { background: #333; }
    .toast.err  { background: #c62828; }
  </style>
</head>
<body>
  <h1>今日の晩ごはん</h1>
  <div class="buttons">
    <button class="yes" onclick="send(true)">🍚 いる</button>
    <button class="no"  onclick="send(false)">🙅 いらない</button>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    async function send(need) {
      document.querySelectorAll("button").forEach(b => b.disabled = true);
      try {
        const res = await fetch("/api/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ need }),
        });
        const data = await res.json();
        showToast(data.ok ? "送信しました！" : "送信に失敗しました", data.ok);
      } catch {
        showToast("通信エラー", false);
      } finally {
        document.querySelectorAll("button").forEach(b => b.disabled = false);
      }
    }
    function showToast(msg, ok) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast show " + (ok ? "ok" : "err");
      setTimeout(() => t.className = "toast", 2500);
    }
  </script>
</body>
</html>
